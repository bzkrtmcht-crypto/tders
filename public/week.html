<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hafta Detayı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #c41e3a; color: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
    .header h1 { font-size: 32px; margin-bottom: 10px; }
    .header a { color: white; text-decoration: none; font-weight: bold; }
    .info-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #c41e3a; }
    .slots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .slot { background: white; border: 2px solid #e74c3c; border-radius: 8px; padding: 20px; }
    .slot.edit { background: #fff9f5; }
    .slot h3 { color: #c41e3a; margin-bottom: 15px; font-size: 18px; }
    .slot-num { display: inline-block; background: #e74c3c; color: white; width: 35px; height: 35px; border-radius: 50%; text-align: center; line-height: 35px; font-weight: bold; margin-right: 10px; }
    .field { margin-bottom: 12px; }
    .field-label { display: block; font-weight: bold; font-size: 12px; text-transform: uppercase; color: #c41e3a; margin-bottom: 5px; }
    .field-text { padding: 8px; background: #f9f9f9; border-left: 3px solid #e74c3c; border-radius: 4px; white-space: pre-wrap; }
    .field-text.hidden { display: none; }
    .field-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; min-height: 60px; resize: vertical; display: none; }
    .field-input.show { display: block; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn-edit { background: #e74c3c; color: white; flex: 1; }
    .btn-edit:hover { background: #c0392b; }
    .btn-save { background: #27ae60; color: white; flex: 1; display: none; }
    .btn-save:hover { background: #229954; }
    .btn-cancel { background: #95a5a6; color: white; flex: 1; display: none; }
    .btn-cancel:hover { background: #7f8c8d; }
    .slot.edit .btn-edit { display: none; }
    .slot.edit .btn-save { display: block; }
    .slot.edit .btn-cancel { display: block; }
    .slot.edit .field-text { display: none; }
    .slot.edit .field-input { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/">← Ana Sayfa</a>
      <h1 id="weekTitle">Hafta Detayı</h1>
      <p id="weekGoals"></p>
    </div>

    <div class="info-box">
      <h3>⏰ 60 Dakika = 6 × 10 Dakika Bölümü</h3>
      <p>Her 10 dakikalık dersin detaylarını görmek için "Düzenle"ye tıklayın.</p>
    </div>

    <div id="slots" class="slots-grid"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const weekId = urlParams.get('id');

    function loadWeek() {
      fetch(`/api/weeks/${weekId}`)
        .then(r => r.json())
        .then(data => {
          const { week, hours } = data;
          document.getElementById('weekTitle').innerText = `HAFTA ${week.week_number}: ${week.title}`;
          document.getElementById('weekGoals').innerText = week.goals;

          const html = hours.map(h => `
            <div class="slot view" id="slot-${h.id}">
              <h3><span class="slot-num">${h.hour_number}</span> ${h.baslik}</h3>

              <div class="field">
                <span class="field-label">⏱️ Süre</span>
                <div class="field-text">${h.sure}</div>
                <textarea class="field-input" data-field="sure">${h.sure}</textarea>
              </div>

              <div class="field">
                <span class="field-label">🎯 Hedefler</span>
                <div class="field-text">${h.hedefler}</div>
                <textarea class="field-input" data-field="hedefler">${h.hedefler}</textarea>
              </div>

              <div class="field">
                <span class="field-label">📚 Konular</span>
                <div class="field-text">${h.konu_baslikları}</div>
                <textarea class="field-input" data-field="konu_baslikları">${h.konu_baslikları}</textarea>
              </div>

              <div class="field">
                <span class="field-label">📝 Notlar</span>
                <div class="field-text">${h.notlar}</div>
                <textarea class="field-input" data-field="notlar">${h.notlar}</textarea>
              </div>

              <div class="actions">
                <button class="btn btn-edit" onclick="editSlot(${h.id})">Düzenle</button>
                <button class="btn btn-save" onclick="saveSlot(${h.id})">Kaydet</button>
                <button class="btn btn-cancel" onclick="cancelEdit(${h.id})">İptal</button>
              </div>
            </div>
          `).join('');

          document.getElementById('slots').innerHTML = html;
        });
    }

    function editSlot(id) {
      const slot = document.getElementById(`slot-${id}`);
      slot.classList.add('edit');
      slot.classList.remove('view');
    }

    function cancelEdit(id) {
      location.reload();
    }

    function saveSlot(id) {
      const slot = document.getElementById(`slot-${id}`);
      const data = {
        baslik: slot.querySelector('h3').innerText.trim().split(' ').slice(1).join(' '),
        sure: slot.querySelector('[data-field="sure"]').value,
        hedefler: slot.querySelector('[data-field="hedefler"]').value,
        konu_baslikları: slot.querySelector('[data-field="konu_baslikları"]').value,
        notlar: slot.querySelector('[data-field="notlar"]').value
      };

      fetch(`/api/hours/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
        .then(r => r.json())
        .then(res => {
          if (res.success) {
            alert('Kaydedildi!');
            loadWeek();
          }
        });
    }

    loadWeek();
  </script>
</body>
</html>
